<!DOCTYPE html>
<html lang="kaa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Garena Saytina Xosh Keldiniz</title>
    <link rel="stylesheet" href="free-fire.css">
</head>
<body>


    <main class="hero-section">
        <h1>Bizin Saytti Koriw Ushin Ikonkanin Ustin Basin</h1>
        
        <a href="index.html" class="promo-link">
            <div class="img-wrapper">
                <img src="freefire.jpg" alt="Free Fire Logo">
                <div class="overlay">Kiriw</div>
            </div>
        </a>
    </main>

    <style>
body {
    margin: 0;
    padding: 0;
    background-color: #0b0b0b;
    color: #ffffff;
    font-family: 'Arial Black', Gadget, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
}

header {
    width: 100%;
    background-color: #111;
    border-bottom: 4px solid #ffb400;
    padding: 15px 0;
    position: sticky;
    top: 0;
    z-index: 1000;
}

.nav-links {
    list-style: none;
    display: flex;
    justify-content: center;
    gap: 20px;
    margin: 0;
    padding: 0;
}

.nav-links li a {
    text-decoration: none;
    color: #fff;
    font-size: 14px;
    text-transform: uppercase;
    padding: 10px 15px;
    transition: 0.3s;
    border-radius: 5px;
}

.nav-links li a:hover, .nav-links li a.active {
    background-color: #ffb400;
    color: #000;
    box-shadow: 0 0 15px #ffb400;
}

.hero-section {
    margin-top: 60px;
    text-align: center;
    padding: 20px;
}

h1 {
    font-size: 2rem;
    color: #fff;
    text-transform: uppercase;
    margin-bottom: 50px;
    text-shadow: 2px 2px 10px rgba(255, 180, 0, 0.7);
}

.promo-link {
    display: inline-block;
    text-decoration: none;
}

.img-wrapper {
    position: relative;
    width: 300px;
    height: 300px;
    border: 5px solid #ffb400;
    border-radius: 20px;
    overflow: hidden;
    transition: transform 0.4s ease, box-shadow 0.4s ease;
    background-color: #222;
}

.img-wrapper img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: 0.5s ease;
}

.img-wrapper:hover {
    transform: scale(1.05) rotate(1deg);
    box-shadow: 0 0 40px #ffb400;
}

.img-wrapper:hover img {
    filter: brightness(40%) blur(2px);
    transform: scale(1.2);
}

.overlay {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: #ffb400;
    font-size: 2rem;
    font-weight: bold;
    text-transform: uppercase;
    opacity: 0;
    transition: 0.4s ease;
    letter-spacing: 3px;
    text-shadow: 0 0 10px #000;
}

.img-wrapper:hover .overlay {
    opacity: 1;
}</style>
</body>
</html>
